services:
  app:
    build:
      context: .
      target: development
    command: npm run dev:next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://academy:${POSTGRES_PASSWORD:-academy-local-only}@postgres:5432/academy?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      S3_ENDPOINT: http://minio:9000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - academy-public
      - academy-private

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academy-local-only}
      POSTGRES_DB: academy
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academy -d academy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academy-private

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - academy-private

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "127.0.0.1:8025:8025"
    expose:
      - "1025"
    networks:
      - academy-public
      - academy-private

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-only}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - academy-public
      - academy-private

volumes:
  postgres_data:
  minio_data:

networks:
  academy-public:
  academy-private:
    internal: true
