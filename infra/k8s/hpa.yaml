apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: academy-web
  namespace: ai-strategic-academy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: academy-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

