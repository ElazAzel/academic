apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: academy-web
  namespace: ai-strategic-academy
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: academy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: academy-web
                port:
                  number: 80

