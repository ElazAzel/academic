apiVersion: apps/v1
kind: Deployment
metadata:
  name: academy-web
  namespace: ai-strategic-academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: academy-web
  template:
    metadata:
      labels:
        app: academy-web
    spec:
      containers:
        - name: web
          image: ghcr.io/elazazel/academic:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: academy-config
            - secretRef:
                name: academy-secrets
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

