<body class="bg-background min-h-screen w-full flex flex-col items-center justify-center relative overflow-hidden font-sans text-on-background selection:bg-primary/20 selection:text-primary">
<!-- Abstract Background Shapes -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed/30 blur-[120px] opacity-70"></div>
<div class="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-secondary-fixed/20 blur-[150px] opacity-60"></div>
</div>
<!-- Login Container -->
<main class="z-10 w-full max-w-[440px] px-margin-mobile md:px-0 flex flex-col items-center">
<!-- Login Card -->
<div class="bg-surface-container-lowest w-full rounded-xl border border-outline-variant shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-lg md:p-xl flex flex-col gap-lg backdrop-blur-sm">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-sm pb-md border-b border-surface-container-high">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-sm border border-outline-variant/50">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">
                        school
                    </span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">
                    AI Strategic Academy
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Закрытая образовательная платформа
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded pl-xxl pr-md py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="email" placeholder="Введите ваш e-mail" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Пароль</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container hover:underline transition-colors" href="#">Забыли пароль?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded pl-xxl pr-md py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="password" placeholder="Введите пароль" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="mt-sm w-full bg-primary text-on-primary font-label-lg text-label-lg py-md rounded hover:bg-primary-container transition-colors shadow-sm active:scale-[0.99] flex justify-center items-center gap-sm" type="submit">
<span>Войти в систему</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Links -->
<footer class="mt-lg flex flex-wrap justify-center gap-x-md gap-y-xs text-center font-body-sm text-body-sm text-on-surface-variant/80">
<a class="hover:text-primary transition-colors hover:underline" href="#">Политика конфиденциальности</a>
