<svg xmlns="http://www.w3.org/2000/svg" width="800" height="565" viewBox="0 0 800 565">
  <rect width="800" height="565" fill="#f8f9fa" rx="8"/>
  <rect x="20" y="20" width="760" height="525" fill="none" stroke="#1a73e8" stroke-width="2" rx="6"/>
  <text x="400" y="120" font-family="serif" font-size="36" text-anchor="middle" fill="#1a73e8" font-weight="bold">СЕРТИФИКАТ</text>
  <text x="400" y="165" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#666">Certificate of Completion</text>
  <text x="400" y="220" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#888">Настоящий сертификат подтверждает, что</text>
  <text x="400" y="260" font-family="serif" font-size="28" text-anchor="middle" fill="#333">{{student_name}}</text>
  <text x="400" y="295" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#888">успешно завершил(а) курс</text>
  <text x="400" y="335" font-family="serif" font-size="22" text-anchor="middle" fill="#333">{{course_title}}</text>
  <line x1="200" y1="420" x2="600" y2="420" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="445" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#999">{{issue_date}}</text>
  <text x="400" y="465" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#999">Проверить: {{verification_url}}</text>
</svg>
